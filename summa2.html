<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>light & airy contact · restructured</title>
  <!-- fonts & icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..700;1,14..32,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #f8faff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      position: relative;
      /* soft subtle pattern */
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 190, 150, 0.08) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(150, 200, 255, 0.08) 0%, transparent 40%);
    }

    /* main container — new structure: form and map in a creative split */
    .contact-section {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 50px;
      padding: 40px;
      box-shadow: 
        0 30px 60px -20px rgba(0, 20, 40, 0.15),
        0 0 0 1px rgba(255, 255, 255, 0.9) inset,
        0 10px 30px -10px rgba(244, 139, 85, 0.15);
      border: 1px solid rgba(255,255,255,0.6);
      transition: all 0.3s ease;
    }

    /* new structure: two rows on mobile, but we make an asymmetric grid */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: stretch;
    }

    /* left side: card-like form with extra whitespace */
    .form-card {
      background: white;
      border-radius: 40px;
      padding: 45px 40px;
      box-shadow: 0 25px 45px -20px rgba(0,0,0,0.1), 0 10px 20px -10px rgba(244,139,85,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      transition: transform 0.3s ease, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .form-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 35px 55px -20px rgba(244,139,85,0.25);
    }

    /* decorative pastel blob */
    .form-card::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 70% 20%, #ffe5d9, #fff0e5);
      border-radius: 50%;
      z-index: 0;
      opacity: 0.5;
      filter: blur(40px);
    }

    .heading {
      font-size: 2.8rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #2d3e50, #1a2a36);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .subhead {
      font-size: 1rem;
      color: #6f7c8c;
      margin-bottom: 35px;
      font-weight: 350;
      position: relative;
      z-index: 2;
      border-left: 4px solid #f48b55;
      padding-left: 16px;
    }

    /* form elements */
    .input-group {
      margin-bottom: 25px;
      position: relative;
      z-index: 5;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #f48b55;
      margin-bottom: 8px;
      margin-left: 12px;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 16px 22px;
      border: 1.5px solid #e5ecf5;
      border-radius: 34px;
      font-size: 1rem;
      background: #ffffff;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px -5px rgba(0,0,0,0.02);
      color: #1e2b3a;
    }

    .input-group textarea {
      border-radius: 28px;
      resize: vertical;
      min-height: 130px;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #f48b55;
      outline: none;
      box-shadow: 0 10px 25px -12px #f48b55, 0 0 0 3px rgba(244,139,85,0.15);
    }

    /* send button */
    .send-btn {
      background: #2b3c4f;
      border: none;
      padding: 18px 38px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 0 12px 20px -12px #1e2b3a, 0 2px 0 0 #ffffff80 inset;
      transition: 0.25s;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
    }

    .send-btn i {
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .send-btn:hover {
      background: #f48b55;
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 18px 30px -12px #f48b55;
    }

    .send-btn:hover i {
      transform: translateX(5px);
    }

    /* right side: map with a new creative frame */
    .map-wrapper {
      background: white;
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 25px 45px -20px rgba(0,0,0,0.1), 0 10px 20px -10px rgba(244,139,85,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      transition: 0.3s;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .map-wrapper:hover {
      transform: translateY(-8px);
      box-shadow: 0 35px 55px -20px rgba(244,139,85,0.25);
    }

    /* map title / extra detail */
    .map-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .map-header i {
      font-size: 1.6rem;
      color: #f48b55;
      background: #fef1e9;
      padding: 10px;
      border-radius: 60%;
    }

    .map-header span {
      font-weight: 500;
      color: #2b3c4f;
      font-size: 1.1rem;
    }

    .map-container {
      border-radius: 28px;
      overflow: hidden;
      flex: 1;
      min-height: 300px;
      box-shadow: 0 5px 15px -5px rgba(0,0,0,0.05);
      border: 2px solid white;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      min-height: 320px;
      border: 0;
      display: block;
      filter: saturate(0.9) brightness(1.02);
      transition: 0.4s;
    }

    .map-wrapper:hover iframe {
      filter: saturate(1) brightness(1.05);
    }

    /* some floating micro-interactions */
    .decor-dots {
      position: absolute;
      bottom: 30px;
      left: 30px;
      width: 100px;
      height: 100px;
      background-image: radial-gradient(#f48b55 2px, transparent 2px);
      background-size: 16px 16px;
      opacity: 0.1;
      pointer-events: none;
      z-index: 0;
    }

    /* responsiveness — stacked on mobile */
    @media (max-width: 800px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 30px;
      }
      .contact-section {
        padding: 30px 20px;
        border-radius: 40px;
      }
      .heading {
        font-size: 2.2rem;
      }
      .form-card {
        padding: 35px 25px;
      }
    }

    @media (max-width: 480px) {
      .heading {
        font-size: 2rem;
      }
      .send-btn {
        width: 100%;
        justify-content: center;
      }
      .map-container iframe {
        min-height: 260px;
      }
    }

    /* entrance animation */
    .contact-section {
      animation: fadeUp 0.7s ease-out;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .form-card, .map-wrapper {
      animation: fadeIn 0.9s ease backwards;
    }
    .form-card { animation-delay: 0.1s; }
    .map-wrapper { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <div class="contact-section">
    <!-- new structure: grid with two columns, left form, right map + extra info -->
    <div class="contact-grid">
      <!-- LEFT SIDE: contact form card -->
      <div class="form-card">
        <h2 class="heading">Let's talk</h2>
        <div class="subhead">We’d love to hear from you. Send us a message and we’ll respond as soon as possible.</div>

        <form action="#">
          <div class="input-group">
            <label>full name</label>
            <input type="text" placeholder="e.g. Alex Morgan">
          </div>
          <div class="input-group">
            <label>email address</label>
            <input type="email" placeholder="hello@domain.com">
          </div>
          <div class="input-group">
            <label>phone (optional)</label>
            <input type="text" placeholder="+1 234 567 890">
          </div>
          <div class="input-group">
            <label>message</label>
            <textarea placeholder="How can we help?"></textarea>
          </div>
          <button class="send-btn">
            <span>SEND MESSAGE</span>
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
        <!-- subtle decor -->
        <div class="decor-dots"></div>
      </div>

      <!-- RIGHT SIDE: map + extra info (new structure) -->
      <div class="map-wrapper">
        <div class="map-header">
          <i class="fas fa-map-pin"></i>
          <span>visit our flagship store</span>
        </div>
        <div class="map-container">
          <iframe 
            src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA0s1a7phLN0iaD6-UE7m4qP-z21pH0eSc&q=Eiffel+Tower+Paris+France" 
            allowfullscreen>
          </iframe>
        </div>
        <div style="margin-top: 20px; padding: 0 12px; color: #5c6a7a; display: flex; gap: 20px; flex-wrap: wrap; justify-content: space-between;">
          <div><i class="fas fa-phone-alt" style="color: #f48b55; width: 24px;"></i> +33 1 23 45 67 89</div>
          <div><i class="fas fa-envelope" style="color: #f48b55;"></i> hello@lightairy.co</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
